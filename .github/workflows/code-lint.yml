name: Lint Code

on:
  pull_request:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint check
        uses: astral-sh/ruff-action@v3
        with:
          args: "check"

      - name: Format check
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"